<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除登录状态</title>
</head>
<body>
    <script>
        sessionStorage.clear();
        
        const keysToRemove = [
            'userSession',
            'lastActivity',
            'userSession_backup'
        ];
        
        keysToRemove.forEach(key => {
            localStorage.removeItem(key);
        });
        
        window.location.href = 'index.html';
    </script>
</body>
</html>
